<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <title>Laser Layout</title>
  <!-- Material sheet -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="#4a90d9"/>
  <!-- Nested parts packed on the sheet -->
  <g fill="#ffffff">
    <!-- top-left part with a cutout -->
    <path d="M6 6h9v9H6z"/>
    <!-- ring cutout -->
    <circle cx="10.5" cy="10.5" r="2" fill="#4a90d9"/>
    <!-- top-right circle part -->
    <circle cx="23" cy="9.5" r="3.5"/>
    <!-- bottom-left triangle part -->
    <path d="M6 26l5-8 5 8z"/>
    <!-- bottom-right rounded part -->
    <rect x="18" y="17" width="8" height="9" rx="1.5"/>
  </g>
  <!-- Laser cutting point + beam -->
  <line x1="26" y1="3" x2="22.5" y2="20.5" stroke="#e74c3c" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="22.5" cy="20.5" r="2.2" fill="#e74c3c"/>
  <circle cx="22.5" cy="20.5" r="0.9" fill="#ffffff"/>
</svg>
